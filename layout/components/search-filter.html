<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Filter Component</title>

  <!-- Pretendard Font -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

  <!-- AirDatepicker -->
  <link rel="stylesheet" href="../css/air-datepicker.min.css">

  <!-- Design System -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components/button.css">
  <link rel="stylesheet" href="../css/components/input.css">
  <link rel="stylesheet" href="../css/components/datepicker-custom.css">

  <style>
    body { padding: 20px; background: var(--color-cool-gray-50); }
  </style>
</head>
<body>

<div class="search-card">

  <!-- 섹션 헤더 -->
  <div class="search-section-header">
    <div class="search-section-header__left">
      <span class="search-section-header__title">제목</span>
      <span class="search-section-header__required">*</span>
      <span class="search-section-header__count"><span class="count-dot"></span>999건</span>
      <span class="search-section-header__desc">■ 정보입니다다정보입니다</span>
    </div>
    <div class="search-section-header__right">
      <button class="btn btn--secondary btn--text-only btn--sm" disabled>Disabled</button>
      <button class="btn btn--secondary btn--text-only btn--sm" disabled>Disabled</button>
      <button class="btn btn--outlined-blue btn--text-only btn--sm">Default</button>
      <button class="btn btn--primary btn--text-only btn--sm">Default</button>
    </div>
  </div>

  <!-- 행 1: 3컬럼 검색 필드 -->
  <div class="filter-grid">
    <div class="filter-grid__col">
      <div class="filter-field">
        <label class="filter-label">타이틀 <span class="required-mark">*</span></label>
        <div class="filter-input-wrap">
          <div class="input-combo">
            <select class="select select--sm" id="filterSelect1">
              <option>가나다</option>
              <option>항목 A</option>
              <option>항목 B</option>
            </select>
            <button class="btn btn--ghost btn--icon-only btn--sm filter-search-btn" title="검색">
              <span class="btn__icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-grid__col">
      <div class="filter-field">
        <label class="filter-label">타이틀</label>
        <div class="filter-input-wrap">
          <div class="input-combo">
            <input type="text" class="input" placeholder="가나다" id="filterText1">
            <button class="btn btn--ghost btn--icon-only btn--sm filter-search-btn" title="검색">
              <span class="btn__icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-grid__col filter-grid__col--with-action">
      <div class="filter-field">
        <label class="filter-label">타이틀</label>
        <div class="filter-input-wrap">
          <div class="input-combo">
            <input type="text" class="input" placeholder="입력하세요" id="filterText2">
            <button class="btn btn--primary btn--text-only btn--sm">버튼</button>
          </div>
        </div>
      </div>
      <div class="filter-side-actions">
        <button class="btn btn--primary btn--text-only btn--sm">검색</button>
        <button class="btn btn--secondary btn--icon-only btn--sm" title="초기화">
          <span class="btn__icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- 행 2: 라디오 버튼 -->
  <div class="filter-row filter-row--radio">
    <div class="radio-group">
      <label class="radio-item">
        <input type="radio" name="statusFilter" value="all">
        <span class="radio-custom"></span>
        <span class="radio-label">Unchk</span>
      </label>
      <label class="radio-item">
        <input type="radio" name="statusFilter" value="type1">
        <span class="radio-custom"></span>
        <span class="radio-label">Unchk</span>
      </label>
      <label class="radio-item">
        <input type="radio" name="statusFilter" value="type2">
        <span class="radio-custom"></span>
        <span class="radio-label">Unchk</span>
      </label>
      <label class="radio-item">
        <input type="radio" name="statusFilter" value="type3" checked>
        <span class="radio-custom"></span>
        <span class="radio-label">chk</span>
      </label>
    </div>
    <button class="btn btn--primary btn--text-only btn--sm">버튼</button>
  </div>

  <!-- 행 3: 날짜/시간 범위 -->
  <div class="filter-row filter-row--datetime">
    <div class="filter-field">
      <label class="filter-label">날짜</label>
      <div class="date-range-wrap">
        <div class="datepicker-input-wrap">
          <input type="text" class="input input--date" id="dateFrom" placeholder="2025-00-00">
          <span class="datepicker-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
        </div>
        <span class="range-sep">~</span>
        <div class="datepicker-input-wrap">
          <input type="text" class="input input--date" id="dateTo" placeholder="2025-00-00">
          <span class="datepicker-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
        </div>
      </div>
    </div>

    <div class="filter-field">
      <label class="filter-label">시간</label>
      <div class="date-range-wrap">
        <!-- Time From -->
        <div class="timepicker-wrap" id="timeFrom">
          <input type="text" class="input input--time" id="timeFromVal" value="00:00" placeholder="00:00" readonly>
          <span class="timepicker-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <div class="timepicker-panel">
            <div class="tpicker-col">
              <button class="tpicker-btn" data-target="timeFromH" data-action="up">▲</button>
              <input class="tpicker-val" id="timeFromH" value="00" maxlength="2">
              <button class="tpicker-btn" data-target="timeFromH" data-action="down">▼</button>
            </div>
            <span class="tpicker-sep">:</span>
            <div class="tpicker-col">
              <button class="tpicker-btn" data-target="timeFromM" data-action="up">▲</button>
              <input class="tpicker-val" id="timeFromM" value="00" maxlength="2">
              <button class="tpicker-btn" data-target="timeFromM" data-action="down">▼</button>
            </div>
          </div>
        </div>

        <span class="range-sep">~</span>

        <!-- Time To -->
        <div class="timepicker-wrap" id="timeTo">
          <input type="text" class="input input--time" id="timeToVal" value="23:59" placeholder="00:00" readonly>
          <span class="timepicker-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <div class="timepicker-panel">
            <div class="tpicker-col">
              <button class="tpicker-btn" data-target="timeToH" data-action="up">▲</button>
              <input class="tpicker-val" id="timeToH" value="23" maxlength="2">
              <button class="tpicker-btn" data-target="timeToH" data-action="down">▼</button>
            </div>
            <span class="tpicker-sep">:</span>
            <div class="tpicker-col">
              <button class="tpicker-btn" data-target="timeToM" data-action="up">▲</button>
              <input class="tpicker-val" id="timeToM" value="59" maxlength="2">
              <button class="tpicker-btn" data-target="timeToM" data-action="down">▼</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-field filter-field--action">
      <button class="btn btn--primary btn--text-only btn--sm">버튼</button>
    </div>
  </div>

</div>

<script src="../js/air-datepicker.min.js"></script>
<script src="../js/datepicker-init.js"></script>

</body>
</html>
