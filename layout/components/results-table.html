<!-- Results Header -->
<div class="results-header">
  <div class="results-header__left">
    <span class="results-count">
      검색결과
      <span class="results-count__dot"></span>
      <span id="totalCount">87</span>건
    </span>
    <span class="results-count__desc">■ 더블클릭으로 수정</span>
  </div>
  <div class="results-header__actions">
    <button class="btn btn--add btn--icon-text">
      <span class="btn__icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span>
      버튼
    </button>
    <button class="btn btn--edit btn--text-only">버튼</button>
    <button class="btn btn--del btn--text-only">버튼</button>
    <button class="btn btn--def btn--text-only">버튼</button>
  </div>
</div>

<!-- Table -->
<div class="table-wrap">
  <table class="data-table" id="dataTable">
    <thead>
      <tr>
        <th class="col-check"><input type="checkbox" class="table-checkbox" id="checkAll"></th>
        <th class="col-icon">듣기</th>
        <th class="col-no">No</th>
        <th class="col-icon">화면</th>
        <th class="col-icon">메모</th>
        <th class="col-date sortable">녹취일자</th>
        <th class="col-num sortable">CallTime</th>
        <th class="col-text sortable">상담원명</th>
        <th class="col-num sortable">전화번호</th>
        <th class="col-num sortable">지점번호</th>
        <th class="col-text sortable">고객명</th>
        <th class="col-num sortable">고객번호</th>
        <th class="col-text sortable">업무구분</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- JS로 렌더링 -->
    </tbody>
  </table>
</div>

<!-- Table Footer -->
<div class="table-footer">
  <div class="table-footer__left">
    <select class="page-size-select" id="pageSizeSelect" onchange="onPageSizeChange(this.value)">
      <option value="10">10개씩</option>
      <option value="20">20개씩</option>
      <option value="50">50개씩</option>
      <option value="100">100개씩</option>
      <option value="1000" selected>1000개씩</option>
    </select>
    <span id="pageInfo" class="text-caption text-secondary">1 / 9 페이지</span>
  </div>
  <nav class="pagination" id="pagination" aria-label="페이지네이션"></nav>
</div>
