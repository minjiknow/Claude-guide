<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>
	<header class="gnb">
		<div class="gnb__left">
			<!-- 아이콘 스트립(44px)과 정렬되는 로고 영역 -->
			<a href="#" class="gnb__logo">
				<div class="gnb__logo-icon">c</div>
			</a>

			<!-- 텍스트 패널(156px)과 정렬되는 브랜드명 -->
			<div class="gnb__brand">
				<span class="gnb__logo-text"><span>COMPLY</span>SIGHT</span>
				<span class="gnb__badge">Manager</span>
			</div>

			<div class="gnb__divider"></div>

			<!-- 업체명 선택 -->
			<div class="gnb__company-wrap">
				<select class="gnb__company-select">
					<option>업체명</option>
					<option>업체명 A</option>
					<option>업체명 B</option>
				</select>
			</div>
		</div>

		<div class="gnb__right">
			<div class="gnb__info-item">
				<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<path
						d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 15.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 4.39h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 12a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 19z" />
				</svg>
				고객행복센터
			</div>
			<div class="gnb__divider"></div>
			<div class="gnb__info-item">
				<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
					<circle cx="12" cy="7" r="4" />
				</svg>
				업무담당자 : <strong>홍길동</strong>
			</div>
			<div class="gnb__divider"></div>
			<div class="gnb__login-extend" id="loginExtendBtn">
				<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<circle cx="12" cy="12" r="10" />
					<polyline points="12 6 12 12 16 14" />
				</svg>
				<span class="gnb__login-timer" id="loginTimer">99:59</span>
				<span>로그인연장</span>
			</div>
			<div class="gnb__divider"></div>
			<button class="gnb__icon-btn" title="앱 메뉴">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<rect x="3" y="3" width="7" height="7" />
					<rect x="14" y="3" width="7" height="7" />
					<rect x="14" y="14" width="7" height="7" />
					<rect x="3" y="14" width="7" height="7" />
				</svg>
			</button>
			<button class="gnb__icon-btn" title="로그아웃">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
					<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
					<polyline points="16 17 21 12 16 7" />
					<line x1="21" y1="12" x2="9" y2="12" />
				</svg>
			</button>
		</div>
	</header>

</body>

</html>
