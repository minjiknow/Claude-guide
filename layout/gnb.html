<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GNB Component</title>

	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../assets/css/common.css">
	<link rel="stylesheet" href="../pages/manager/index.css">
</head>

<body>
	<header class="gnb">
		<div class="gnbLeft">
			<a href="#" class="gnbLogo">
				<div class="gnbLogoIcon">C</div>
			</a>
			<div class="gnbBrand">
				<span class="gnbLogoText"><span>COMPLY</span>SIGHT</span>
				<span class="gnbBadge">Manager</span>
			</div>
			<div class="gnbDivider"></div>
			<div class="gnbCompanyWrap">
				<div class="dropbox dropbox-small gnbCompanyDropbox" data-component="dropbox" aria-label="업체 선택">
					<p class="selected-text">업체명</p>
					<ul class="dropbox-option">
						<li data-value=""><p class="option-text">업체명</p></li>
						<li data-value="A"><p class="option-text">업체명 A</p></li>
						<li data-value="B"><p class="option-text">업체명 B</p></li>
					</ul>
				</div>
			</div>
		</div>
		<div class="gnbRight">
			<div class="gnbInfoItem">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					aria-hidden="true">
					<path
						d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 15.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 4.39h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 12a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 19z" />
				</svg>
				고객행복센터
			</div>
			<div class="gnbDivider"></div>
			<div class="gnbInfoItem">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					aria-hidden="true">
					<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
					<circle cx="12" cy="7" r="4" />
				</svg>
				업무담당자 : <strong>홍길동</strong>
			</div>
			<div class="gnbDivider"></div>
			<div class="gnbLoginExtend" id="loginExtendBtn">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					aria-hidden="true">
					<circle cx="12" cy="12" r="10" />
					<polyline points="12 6 12 12 16 14" />
				</svg>
				<span class="gnbLoginTimer" id="loginTimer">99:59</span>
				<span>로그인연장</span>
			</div>
			<div class="gnbDivider"></div>
			<button class="gnbIconBtn" type="button" title="앱 메뉴" aria-label="앱 메뉴">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					aria-hidden="true">
					<rect x="3" y="3" width="7" height="7" />
					<rect x="14" y="3" width="7" height="7" />
					<rect x="14" y="14" width="7" height="7" />
					<rect x="3" y="14" width="7" height="7" />
				</svg>
			</button>
			<button class="gnbIconBtn" type="button" title="로그아웃" aria-label="로그아웃">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					aria-hidden="true">
					<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
					<polyline points="16 17 21 12 16 7" />
					<line x1="21" y1="12" x2="9" y2="12" />
				</svg>
			</button>
		</div>
	</header>

	<script src="../assets/jquery/jquery-4.0.0.min.js"></script>
	<script src="../pages/manager/index.js"></script>
</body>

</html>
