<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Button Component</title>
	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../../assets/css/common.css" />
	<link rel="stylesheet" href="style.css" />
</head>

<body>
	<main class="l-page" style="background-color:#ffffff">

		<div class="l-section">
			<h2>Primary</h2>
			<button class="btn is-primary" type="button">
				<span class="btnIcon" aria-hidden="true">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2.5">
						<line x1="12" y1="5" x2="12" y2="19" />
						<line x1="5" y1="12" x2="19" y2="12" />
					</svg>
				</span>
				<span class="btnText">추가하기</span>
			</button>
			<button class="btn is-primary" type="button"><span class="btnText">확인</span></button>
			<button class="btn is-primary is-iconOnly" type="button" aria-label="추가">
				<span class="btnIcon" aria-hidden="true">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2.5">
						<line x1="12" y1="5" x2="12" y2="19" />
						<line x1="5" y1="12" x2="19" y2="12" />
					</svg>
				</span>
			</button>
			<button class="btn is-primary" type="button" disabled><span class="btnText">비활성</span></button>
		</div>

		<div class="l-section">
			<h2>Secondary</h2>
			<button class="btn is-secondary" type="button"><span class="btnText">취소</span></button>
			<button class="btn is-secondary is-iconOnly" type="button" aria-label="새로고침">
				<span class="btnIcon" aria-hidden="true">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<polyline points="23 4 23 10 17 10" />
						<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
					</svg>
				</span>
			</button>
			<button class="btn is-secondary" type="button" disabled><span class="btnText">비활성</span></button>
		</div>

		<div class="l-section">
			<h2>Outlined</h2>
			<button class="btn is-outlinedBlue" type="button"><span class="btnText">초기화</span></button>
			<button class="btn is-primary" type="button"><span class="btnText">검색</span></button>
		</div>

		<div class="l-section">
			<h2>Ghost</h2>
			<button class="btn is-ghost" type="button"><span class="btnText">더보기</span></button>
			<button class="btn is-ghost is-iconOnly" type="button" aria-label="닫기">
				<span class="btnIcon" aria-hidden="true">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<line x1="18" y1="6" x2="6" y2="18" />
						<line x1="6" y1="6" x2="18" y2="18" />
					</svg>
				</span>
			</button>
		</div>

		<div class="l-section">
			<h2>Danger</h2>
			<button class="btn is-danger" type="button"><span class="btnText">삭제</span></button>
		</div>

		<div class="l-section">
			<h2>Small</h2>
			<button class="btn is-primary h-sm" type="button"><span class="btnText">추가</span></button>
			<button class="btn is-secondary h-sm" type="button"><span class="btnText">취소</span></button>
			<button class="btn is-outlinedBlue h-sm" type="button"><span class="btnText">초기화</span></button>
		</div>

		<div class="l-section">
			<h2>Table Actions</h2>
			<button class="btn is-add h-sm" type="button">
				<span class="btnIcon" aria-hidden="true">
					<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2.5">
						<line x1="12" y1="5" x2="12" y2="19" />
						<line x1="5" y1="12" x2="19" y2="12" />
					</svg>
				</span>
				<span class="btnText">추가</span>
			</button>
			<button class="btn is-edit h-sm" type="button"><span class="btnText">수정</span></button>
			<button class="btn is-del h-sm" type="button"><span class="btnText">삭제</span></button>
			<button class="btn is-def h-sm" type="button"><span class="btnText">기본</span></button>
		</div>

	</main>
	<script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
	<script src="script.js"></script>
</body>

</html>
