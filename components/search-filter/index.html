<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Search Filter Component</title>
	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../../assets/css/vendor/air-datepicker.min.css" />
	<link rel="stylesheet" href="../../assets/css/common.css" />
	<link rel="stylesheet" href="style.css" />
</head>

<body>
	<div class="searchCard">
		<div class="searchCardHeader">
			<div class="searchCardHeaderLeft">
				<span class="searchCardTitle">제목</span>
				<span class="searchCardRequired">*</span>
				<span class="searchCardCount">
					<span id="headerCount">999</span>건
				</span>
				<span class="searchCardDesc"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" rx="2" fill="#111111"/><path d="M6 8V6" stroke="white" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 4H6.005" stroke="white" stroke-linecap="round" stroke-linejoin="round"/></svg> 정보입니다</span>
			</div>
			<div class="searchCardHeaderRight">
				<button class="btn is-secondary h-sm" type="button" disabled>Disabled</button>
				<button class="btn is-secondary h-sm" type="button" disabled>Disabled</button>
				<button class="btn is-outlinedBlue h-sm" type="button">Default</button>
				<button class="btn is-primary h-sm" type="button">Default</button>
			</div>
		</div>

		<div class="searchFilterArea">
			<div class="filterRows">
				<!-- 행 1: 3컬럼 -->
				<div class="filterRow">
					<div class="filterCol">
						<div class="filterField">
							<label class="filterLabel">타이틀 <span class="requiredMark">*</span></label>
							<div class="filterInputWrap">
								<div class="inputCombo">
									<div class="dropbox h-sm" id="filterSelect1" data-component="dropbox"
										aria-label="타이틀 선택">
										<p class="selected-text">가나다</p>
										<ul class="dropbox-option">
											<li data-value="">
												<p class="option-text">가나다</p>
											</li>
											<li data-value="A">
												<p class="option-text">항목 A</p>
											</li>
											<li data-value="B">
												<p class="option-text">항목 B</p>
											</li>
										</ul>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="filterCol">
						<div class="filterField">
							<label class="filterLabel" for="filterText1">타이틀</label>
							<div class="filterInputWrap">
								<div class="search h-sm w-full">
									<input class="searchInput w-full" id="filterText1" type="text" placeholder="가나다"
										autocomplete="off">
									<button class="searchButton filterSearchBtn" type="button" title="검색"
										aria-label="검색">
										<svg width="16" height="16" viewBox="0 0 16 16" fill="none"
											aria-hidden="true">
											<circle cx="6.5" cy="6.5" r="5" stroke="currentColor"
												stroke-width="1.5" />
											<path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5"
												stroke-linecap="round" />
										</svg>
									</button>
								</div>
							</div>
						</div>
					</div>
					<div class="filterCol is-withAction">
						<div class="filterField">
							<label class="filterLabel" for="filterText2">타이틀</label>
							<div class="filterInputWrap">
								<div class="inputCombo">
									<input type="text" class="filterInput h-sm" id="filterText2" placeholder="입력하세요"
										autocomplete="off">
									<button class="btn is-primary h-sm" type="button">버튼</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- 행 2: 멀티 드롭박스 -->
				<div class="filterRow">
					<div class="filterCol">
						<div class="filterField">
							<label class="filterLabel">단일 선택</label>
							<div class="filterInputWrap">
								<div class="dropbox h-sm w-full" data-component="dropbox">
									<p class="selected-text">전체</p>
									<ul class="dropbox-option">
										<li data-value="A">
											<p class="option-text">항목 A</p>
										</li>
										<li data-value="B">
											<p class="option-text">항목 B</p>
										</li>
										<li data-value="C">
											<p class="option-text">항목 C</p>
										</li>
									</ul>
								</div>
							</div>
						</div>
					</div>
					<div class="filterCol">
						<div class="filterField">
							<label class="filterLabel">멀티 선택</label>
							<div class="filterInputWrap">
								<div class="dropbox h-sm w-full" data-component="dropbox" data-multi="true">
									<p class="selected-text">전체</p>
									<ul class="dropbox-option">
										<li data-value="A">
											<div class="option-inner">
												<span class="optionMark"></span>
												<p class="option-text">항목 A</p>
											</div>
										</li>
										<li data-value="B">
											<div class="option-inner">
												<span class="optionMark"></span>
												<p class="option-text">항목 B</p>
											</div>
										</li>
										<li data-value="C">
											<div class="option-inner">
												<span class="optionMark"></span>
												<p class="option-text">항목 C</p>
											</div>
										</li>
									</ul>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- 행 3: 라디오 -->
				<div class="filterRow is-radio">
					<div class="radioGroup" role="radiogroup" aria-label="상태 필터">
						<label class="radioItem">
							<input type="radio" name="statusFilter" value="all">
							<span class="radioCustom"></span>
							<span class="radioLabel">Unchk</span>
						</label>
						<label class="radioItem">
							<input type="radio" name="statusFilter" value="type1">
							<span class="radioCustom"></span>
							<span class="radioLabel">Unchk</span>
						</label>
						<label class="radioItem">
							<input type="radio" name="statusFilter" value="type2" disabled>
							<span class="radioCustom"></span>
							<span class="radioLabel">Unchk</span>
						</label>
						<label class="radioItem">
							<input type="radio" name="statusFilter" value="type3" checked>
							<span class="radioCustom"></span>
							<span class="radioLabel">chk</span>
						</label>
					</div>
					<button class="btn is-primary h-sm" type="button">버튼</button>
				</div>

				<!-- 행 4: 날짜/시간 -->
				<div class="filterRow is-datetime">
					<div class="filterField">
						<label class="filterLabel" for="dateFrom">날짜</label>
						<div class="dateRangeWrap">
							<div class="datepickerWrap">
								<input type="text" class="filterInput h-sm is-date" id="dateFrom" placeholder="YYYY-MM-DD"
									>
								<span class="datepickerIcon" aria-hidden="true">
									<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
										stroke-width="2">
										<rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
										<line x1="16" y1="2" x2="16" y2="6" />
										<line x1="8" y1="2" x2="8" y2="6" />
										<line x1="3" y1="10" x2="21" y2="10" />
									</svg>
								</span>
							</div>
							<span class="rangeSep" aria-hidden="true">~</span>
							<div class="datepickerWrap">
								<input type="text" class="filterInput h-sm is-date" id="dateTo" placeholder="YYYY-MM-DD"
									>
								<span class="datepickerIcon" aria-hidden="true">
									<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
										stroke-width="2">
										<rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
										<line x1="16" y1="2" x2="16" y2="6" />
										<line x1="8" y1="2" x2="8" y2="6" />
										<line x1="3" y1="10" x2="21" y2="10" />
									</svg>
								</span>
							</div>
						</div>
					</div>
					<div class="filterField">
						<label class="filterLabel" for="timeFromVal">시간</label>
						<div class="dateRangeWrap">
							<div class="timepickerWrap" id="timeFrom">
								<input type="text" class="timeInput h-sm" id="timeFromVal" value="00:00" placeholder="00:00"
									>
								<span class="timepickerIcon" aria-hidden="true">
									<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
										stroke-width="2">
										<circle cx="12" cy="12" r="10" />
										<polyline points="12 6 12 12 16 14" />
									</svg>
								</span>
								<div class="timepickerPanel" role="dialog" aria-label="시작 시간 선택">
									<div class="tpickerCol">
										<button class="tpickerBtn" type="button" data-target="timeFromH"
											data-action="up" aria-label="시 증가">▲</button>
										<input class="tpickerVal" id="timeFromH" value="00" maxlength="2"
											aria-label="시">
										<button class="tpickerBtn" type="button" data-target="timeFromH"
											data-action="down" aria-label="시 감소">▼</button>
									</div>
									<span class="tpickerSep" aria-hidden="true">:</span>
									<div class="tpickerCol">
										<button class="tpickerBtn" type="button" data-target="timeFromM"
											data-action="up" aria-label="분 증가">▲</button>
										<input class="tpickerVal" id="timeFromM" value="00" maxlength="2"
											aria-label="분">
										<button class="tpickerBtn" type="button" data-target="timeFromM"
											data-action="down" aria-label="분 감소">▼</button>
									</div>
								</div>
							</div>
							<span class="rangeSep" aria-hidden="true">~</span>
							<div class="timepickerWrap" id="timeTo">
								<input type="text" class="timeInput h-sm" id="timeToVal" value="23:59" placeholder="00:00"
									>
								<span class="timepickerIcon" aria-hidden="true">
									<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
										stroke-width="2">
										<circle cx="12" cy="12" r="10" />
										<polyline points="12 6 12 12 16 14" />
									</svg>
								</span>
								<div class="timepickerPanel" role="dialog" aria-label="종료 시간 선택">
									<div class="tpickerCol">
										<button class="tpickerBtn" type="button" data-target="timeToH" data-action="up"
											aria-label="시 증가">▲</button>
										<input class="tpickerVal" id="timeToH" value="23" maxlength="2" aria-label="시">
										<button class="tpickerBtn" type="button" data-target="timeToH"
											data-action="down" aria-label="시 감소">▼</button>
									</div>
									<span class="tpickerSep" aria-hidden="true">:</span>
									<div class="tpickerCol">
										<button class="tpickerBtn" type="button" data-target="timeToM" data-action="up"
											aria-label="분 증가">▲</button>
										<input class="tpickerVal" id="timeToM" value="59" maxlength="2" aria-label="분">
										<button class="tpickerBtn" type="button" data-target="timeToM"
											data-action="down" aria-label="분 감소">▼</button>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="filterField is-action">
						<button class="btn is-primary h-sm" type="button">버튼</button>
					</div>
				</div>
			</div>
			<!-- 검색/초기화 버튼 -->
			<div class="filterSideActions">
				<button class="btn Card-SearchActionBtn hfull" type="button" id="searchBtn">검색</button>
				<button class="btn Card-ResetActionBtn hfull" type="button" title="초기화" aria-label="초기화"
					id="resetBtn">
					<span class="btnIcon">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" aria-hidden="true">
							<polyline points="23 4 23 10 17 10" />
							<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
						</svg>
					</span>
				</button>
			</div>
		</div>

	</div>

	<script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
	<script src="../../assets/js/vendor/air-datepicker.min.js"></script>
	<script src="../dropdown/script.js"></script>
	<script src="../datepicker/script.js"></script>
	<script src="script.js"></script>
</body>

</html>
