<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Input Component</title>
	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../../assets/css/common.css" />
	<link rel="stylesheet" href="../button/style.css" />
	<link rel="stylesheet" href="../dropdown/style.css" />
	<link rel="stylesheet" href="style.css" />
</head>

<body>
	<main class="l-page">

		<section class="l-sectionBlock">
			<h2>Input</h2>
			<div class="demoCol">
				<input class="filterInput w-full" type="text" placeholder="기본 입력" />
				<input class="filterInput w-full" type="text" placeholder="포커스 상태 확인" />
				<input class="filterInput w-full" type="text" value="읽기 전용" readonly />
				<input class="filterInput w-full" type="text" placeholder="비활성" disabled />
			</div>
		</section>

		<section class="l-sectionBlock">
			<h2>Select (Dropdown)</h2>
			<div class="demoRow demoRow-sm">
				<div class="dropbox w-full" data-component="dropbox" aria-label="항목 선택">
					<p class="selected-text">전체</p>
					<ul class="dropbox-option">
						<li data-value=""><p class="option-text">전체</p></li>
						<li data-value="A"><p class="option-text">항목 A</p></li>
						<li data-value="B"><p class="option-text">항목 B</p></li>
					</ul>
				</div>
			</div>
		</section>

		<section class="l-sectionBlock">
			<h2>Input Combo</h2>
			<div class="demoRow">
				<div class="inputCombo">
					<input class="filterInput" type="text" placeholder="검색어 입력" />
					<button class="btn is-primary h-sm filterSearchBtn" type="button">
						<span class="btnText">검색</span>
					</button>
				</div>
			</div>
		</section>

	</main>
	<script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
	<script src="../dropdown/script.js"></script>
	<script src="script.js"></script>
</body>

</html>
