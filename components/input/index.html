<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Input Component</title>
	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../../assets/css/common.css" />
	<link rel="stylesheet" href="../button/style.css" />
	<link rel="stylesheet" href="style.css" />
</head>

<body>
	<main class="l-page">

		<section class="l-sectionBlock">
			<h2>Input</h2>
			<div class="demoCol">
				<input class="filterInput" type="text" placeholder="기본 입력" />
				<input class="filterInput" type="text" placeholder="포커스 상태 확인" />
				<input class="filterInput" type="text" value="읽기 전용" readonly />
				<input class="filterInput" type="text" placeholder="비활성" disabled />
			</div>
		</section>

		<section class="l-sectionBlock">
			<h2>Select</h2>
			<div class="demoRow demoRow-sm">
				<select class="filterSelect">
					<option>전체</option>
					<option>항목 A</option>
					<option>항목 B</option>
				</select>
			</div>
		</section>

		<section class="l-sectionBlock">
			<h2>Input Combo</h2>
			<div class="demoRow">
				<div class="inputCombo">
					<input class="filterInput" type="text" placeholder="검색어 입력" />
					<button class="btn is-ghost is-sm is-iconOnly filterSearchBtn" type="button" aria-label="검색">
						<span class="btnIcon">
							<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
								stroke-width="2">
								<circle cx="11" cy="11" r="8" />
								<line x1="21" y1="21" x2="16.65" y2="16.65" />
							</svg>
						</span>
					</button>
				</div>
			</div>
		</section>

	</main>
</body>

</html>
