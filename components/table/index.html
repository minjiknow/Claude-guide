<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Results Table Component</title>
	<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
		rel="stylesheet">
	<link rel="stylesheet" href="../../assets/css/common.css" />
	<link rel="stylesheet" href="../dropdown/style.css" />
	<link rel="stylesheet" href="style.css" />
</head>

<body style="padding: 20px; background: var(--gray-c50);">
	<div class="resultsCard">
		<div class="resultsCardBody">
			<div class="resultsHeader">
				<div class="resultsHeaderLeft">
					<span class="resultsCount">
						검색결과 <span class="resultsCountNum"><span id="totalCount">87</span>건</span>
					</span>
					<span class="resultsCountDesc"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" rx="2" fill="#111111"/><path d="M6 8V6" stroke="white" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 4H6.005" stroke="white" stroke-linecap="round" stroke-linejoin="round"/></svg> 더블클릭으로 수정</span>
				</div>
				<div class="resultsHeaderActions">
					<button class="btn is-add h-sm" type="button">
						<span class="btnText">버튼</span>
					</button>
					<button class="btn is-primary h-sm" type="button"><span class="btnText">버튼</span></button>
					<button class="btn is-primary h-sm" type="button"><span class="btnText">버튼</span></button>
					<button class="btn is-primary h-sm" type="button"><span class="btnText">버튼</span></button>
				</div>
			</div>

			<div class="tableWrap">
				<table class="table" id="dataTable">
					<colgroup>
						<col style="width:60px">  <!-- 체크 -->
						<col>                     <!-- 듣기 -->
						<col>                     <!-- No -->
						<col>                     <!-- 화면 -->
						<col>                     <!-- 메모 -->
						<col style="width:228px"> <!-- 녹취일자 -->
						<col>                     <!-- CallTime -->
						<col>                     <!-- 상담원명 -->
						<col style="width:140px"> <!-- 전화번호 -->
						<col>                     <!-- 지점번호 -->
						<col>                     <!-- 고객명 -->
						<col style="width:140px"> <!-- 고객번호 -->
						<col>                     <!-- 업무구분 -->
					</colgroup>
					<thead class="tableHead">
						<tr>
							<th class="col-check" scope="col">
								<input type="checkbox" class="tableCheckbox" id="checkAll" aria-label="전체 선택">
							</th>
							<th class="col-icon" scope="col">듣기</th>
							<th class="col-no" scope="col">No</th>
							<th class="col-icon" scope="col">화면</th>
							<th class="col-icon" scope="col">메모</th>
							<th class="col-date is-sortable" scope="col">녹취일자</th>
							<th class="col-num is-sortable" scope="col">CallTime</th>
							<th class="col-text is-sortable" scope="col">상담원명</th>
							<th class="col-num is-sortable" scope="col">전화번호</th>
							<th class="col-num is-sortable" scope="col">지점번호</th>
							<th class="col-text is-sortable" scope="col">고객명</th>
							<th class="col-num is-sortable" scope="col">고객번호</th>
							<th class="col-text is-sortable" scope="col">업무구분</th>
						</tr>
					</thead>
					<tbody class="tableBody" id="tableBody"></tbody>
				</table>
			</div>

			<div class="tableFooter">
				<div class="tableFooterLeft">
					<div class="dropbox dropbox-small pageSizeDropbox" id="pageSizeSelect" data-component="dropbox" aria-label="페이지당 항목 수">
						<p class="selected-text">10개씩</p>
						<ul class="dropbox-option">
							<li data-value="10" class="selected"><p class="option-text">10개씩</p></li>
							<li data-value="20"><p class="option-text">20개씩</p></li>
							<li data-value="50"><p class="option-text">50개씩</p></li>
							<li data-value="100"><p class="option-text">100개씩</p></li>
						</ul>
					</div>
					<span id="pageInfo" class="u-visually-hidden"></span>
				</div>
				<nav class="pagination" id="pagination" aria-label="페이지네이션"></nav>
			</div>
		</div>
	</div>

	<script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
	<script src="../dropdown/script.js"></script>
	<script src="script.js"></script>
</body>

</html>
