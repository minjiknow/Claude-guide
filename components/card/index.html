<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Component</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="l-page">

    <!-- Shadow 타입 -->
    <div class="card is-shadow">
      <div class="cardHeader">
        <h3 class="cardTitle">카드 제목</h3>
        <p class="cardSubtitle">부제목 또는 날짜</p>
      </div>
      <div class="cardBody">
        <p>카드 본문 내용입니다. 여기에 설명 텍스트나 데이터를 넣을 수 있습니다.</p>
      </div>
      <div class="cardFooter">
        <button class="btn is-primary" type="button">
          <span class="btnText">확인</span>
        </button>
        <button class="btn is-secondary" type="button">
          <span class="btnText">취소</span>
        </button>
      </div>
    </div>

    <!-- Outline 타입 -->
    <div class="card is-outline">
      <div class="cardHeader">
        <h3 class="cardTitle">아웃라인 카드</h3>
      </div>
      <div class="cardBody">
        <p>테두리 스타일의 카드 컴포넌트입니다.</p>
      </div>
      <div class="cardFooter">
        <button class="btn is-ghost" type="button">
          <span class="btnText">더보기</span>
        </button>
      </div>
    </div>

  </main>

  <script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
  <script src="../../assets/js/common.js"></script>
  <script src="script.js"></script>
</body>
</html>
