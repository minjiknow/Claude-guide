<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchBox Component</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="l-page">

    <section class="l-sectionBlock">
      <h2>SearchBox — input + button 조합</h2>
      <div class="inputCombo w-full">
        <label for="search-a" class="u-visually-hidden">검색</label>
        <input class="filterInput h-sm w-full" id="search-a" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
        <button class="btn is-primary h-sm" type="button">검색</button>
      </div>
    </section>

    <section class="l-sectionBlock">
      <h2>SearchBox — input 안에 버튼(아이콘만) 조합</h2>
      <div class="search h-sm w-full">
        <label for="search-b" class="u-visually-hidden">검색</label>
        <input class="searchInput w-full" id="search-b" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
        <button class="searchButton filterSearchBtn" type="button" title="검색" aria-label="검색">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </section>

  </main>

  <script src="../../assets/jquery/jquery-4.0.0.min.js"></script>
  <script src="../../assets/js/common.js"></script>
  <script src="script.js"></script>
</body>
</html>
