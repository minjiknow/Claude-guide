<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchBox Component</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="l-page">

    <form class="search" role="search">
      <label for="search-main" class="u-visually-hidden">검색</label>
      <input class="searchInput" id="search-main" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
      <button class="searchButton" type="submit" aria-label="검색">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/common.js"></script>
  <script src="script.js"></script>
</body>
</html>
